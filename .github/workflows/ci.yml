name: CI
run-name: CI ${{ github.event.pull_request.title }}

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  ci:
    uses: bamiyanapp/dev-standards/.github/workflows/reusable-ci.yml@main
    with:
      node_version: '24'
      enable_release: false
      workspaces: true
    secrets:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
