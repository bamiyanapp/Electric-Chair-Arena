name: CI
run-name: CI ${{ github.event.pull_request.title }}

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  ci:
    # TODO: dev-standards の claude/electric-chair-code-standard-hj4kfi (node_version/enable_release_sync/workspaces対応) が
    # main にマージされ次第、このSHA固定を `@main` に戻すこと。
    uses: bamiyanapp/dev-standards/.github/workflows/reusable-ci.yml@3fd203e667088b17f4480f2f590dedd4d7151112
    with:
      node_version: '24'
      enable_release_sync: false
      workspaces: true
    secrets:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
