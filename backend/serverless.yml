service: electric-chair-arena-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-northeast-1
  environment:
    GEMINI_API: ${env:GEMINI_API, ''}
    MATCHES_TABLE: ${self:service}-matches-${opt:stage, 'dev'}
    PLAYERS_TABLE: ${self:service}-players-${opt:stage, 'dev'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt MatchesTable.Arn
            - !GetAtt PlayersTable.Arn

functions:
  getPlayers:
    handler: handler.getPlayers
    events:
      - http:
          path: get-players
          method: get
          cors: true
  startMatch:
    handler: handler.startMatch
    events:
      - http:
          path: start-match
          method: post
          cors: true
  getMatches:
    handler: handler.getMatches
    events:
      - http:
          path: get-matches
          method: get
          cors: true
  getMatchResult:
    handler: handler.getMatchResult
    events:
      - http:
          path: get-match-result
          method: get
          cors: true
  getLeaderboard:
    handler: handler.getLeaderboard
    events:
      - http:
          path: get-leaderboard
          method: get
          cors: true
  getAiMove:
    handler: handler.getAiMove
    events:
      - http:
          path: ai-move
          method: post
          cors: true
  saveMatch:
    handler: handler.saveMatch
    events:
      - http:
          path: save-match
          method: post
          cors: true
  generateCommentary:
    handler: handler.generateCommentary
    events:
      - http:
          path: generate-commentary
          method: post
          cors: true

plugins:
  - serverless-offline
  - serverless-dynamodb-local

custom:
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true

resources:
  Resources:
    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
    PlayersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PLAYERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
